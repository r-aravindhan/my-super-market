databaseChangeLog:
  - changeSet:
      id: 001-create-bills-table
      author: liquibase
      changes:
        - createTable:
            tableName: bills
            columns:
              - column:
                  name: id
                  type: varchar(255)
                  constraints:
                    primaryKey: true
              - column:
                  name: subtotal
                  type: decimal(19, 2)
              - column:
                  name: discount_amount
                  type: decimal(19, 2)
              - column:
                  name: total
                  type: decimal(19, 2)
              - column:
                  name: currency
                  type: varchar(255)
              - column:
                  name: applied_discount_code
                  type: varchar(255)
              - column:
                  name: created_at
                  type: timestamp

  - changeSet:
      id: 002-create-bill-items-table
      author: liquibase
      changes:
        - createTable:
            tableName: bill_items
            columns:
              - column:
                  name: bill_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: int
        - addForeignKeyConstraint:
            baseTableName: bill_items
            baseColumnNames: bill_id
            referencedTableName: bills
            referencedColumnNames: id
            constraintName: fk_bill_items_bill

  - changeSet:
      id: 003-create-bill-item-prices-table
      author: liquibase
      changes:
        - createTable:
            tableName: bill_item_prices
            columns:
              - column:
                  name: bill_id
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: sku
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: price
                  type: decimal(19, 2)
        - addForeignKeyConstraint:
            baseTableName: bill_item_prices
            baseColumnNames: bill_id
            referencedTableName: bills
            referencedColumnNames: id
            constraintName: fk_bill_item_prices_bill
