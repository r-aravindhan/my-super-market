server:
  port: 8080

spring:
  application:
    name: billing-service
  datasource:
    url: jdbc:h2:mem:billingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

services:
  inventory:
    url: http://localhost:8081
  pricing:
    url: http://localhost:8082
  discounts:
    url: http://localhost:8083

logging:
  level:
    com.supermarket: DEBUG
